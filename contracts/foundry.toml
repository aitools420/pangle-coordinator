[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]

[rpc_endpoints]
local = "http://127.0.0.1:8545"
pulsechain_testnet = "${PULSECHAIN_TESTNET_RPC}"
